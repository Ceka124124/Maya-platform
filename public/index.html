<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Maya — Giriş</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#080810;--card:#10121e;--card2:#181a2a;--border:#ffffff0c;--border2:#ffffff18;--accent:#ff6b35;--a2:#ffb347;--a3:#ff3d71;--text:#eeeef8;--muted:#5a5a80;--green:#2ed573}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow-x:hidden}
.bg-orbs{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0}
.orb{position:absolute;border-radius:50%;filter:blur(100px);animation:drift 10s ease-in-out infinite alternate}
.orb1{width:500px;height:500px;background:#ff6b3512;top:-200px;left:-150px}
.orb2{width:400px;height:400px;background:#7c3aed10;bottom:-150px;right:-100px;animation-delay:-5s}
@keyframes drift{from{transform:translate(0,0)}to{transform:translate(30px,40px)}}
.grid{position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(rgba(255,107,53,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,107,53,.025) 1px,transparent 1px);background-size:40px 40px}
.page{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 16px 40px}
.logo-wrap{text-align:center;margin-bottom:32px}
.logo{font-family:'Syne',sans-serif;font-size:clamp(2.6rem,8vw,4rem);font-weight:900;letter-spacing:-2px;background:linear-gradient(135deg,var(--accent),var(--a2),var(--a3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 40px rgba(255,107,53,.4))}
.tagline{color:var(--muted);font-size:.78rem;letter-spacing:3px;text-transform:uppercase;margin-top:5px}
.card{width:min(400px,100%);background:var(--card);border:1px solid var(--border2);border-radius:24px;padding:28px 24px;box-shadow:0 24px 60px rgba(0,0,0,.7);position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,107,53,.5),rgba(255,179,71,.5),transparent)}
.tabs{display:flex;background:#ffffff07;border-radius:12px;padding:4px;margin-bottom:24px;gap:4px}
.tab{flex:1;padding:10px;border:none;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.88rem;font-weight:500;border-radius:9px;cursor:pointer;transition:.2s}
.tab.active{background:linear-gradient(135deg,var(--accent),var(--a2));color:#fff;font-weight:700;box-shadow:0 4px 16px rgba(255,107,53,.35)}
.flabel{display:block;font-size:.7rem;color:var(--muted);font-weight:600;letter-spacing:.8px;text-transform:uppercase;margin:0 0 6px 2px}
.finput{width:100%;padding:13px 16px;background:#ffffff07;border:1px solid var(--border2);border-radius:12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.95rem;outline:none;transition:.2s;margin-bottom:16px}
.finput:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(255,107,53,.12)}
.finput::placeholder{color:var(--muted)}
.btn-main{width:100%;padding:14px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--accent),var(--a2));color:#fff;font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;letter-spacing:.5px;cursor:pointer;transition:.2s;box-shadow:0 8px 28px rgba(255,107,53,.35)}
.btn-main:hover{transform:translateY(-2px);box-shadow:0 12px 36px rgba(255,107,53,.5)}
.btn-main:active{transform:scale(.97)}
.divider{display:flex;align-items:center;gap:12px;margin:16px 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.divider span{color:var(--muted);font-size:.72rem;white-space:nowrap}
.btn-ghost{width:100%;padding:13px;border:1px solid var(--border2);border-radius:14px;background:transparent;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:500;cursor:pointer;transition:.2s}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);background:rgba(255,107,53,.06)}
.err{color:#ff4757;font-size:.78rem;margin:-10px 0 12px 4px;display:none;animation:shake .3s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.notice{margin-top:16px;text-align:center;font-size:.74rem;color:var(--muted);background:#ffffff04;border-radius:10px;padding:10px 12px;border:1px dashed var(--border);line-height:1.5}
.notice b{color:var(--green)}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-10px);background:var(--card2);border:1px solid var(--border2);border-radius:99px;padding:9px 20px;font-size:.82rem;color:var(--text);z-index:999;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="bg-orbs"><div class="orb orb1"></div><div class="orb orb2"></div></div>
<div class="grid"></div>
<div class="page">
  <div class="logo-wrap">
    <div class="logo">🔥 Maya</div>
    <div class="tagline">Multiplayer Oyun Platformu</div>
  </div>
  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Giriş</button>
      <button class="tab" onclick="switchTab('reg')">Qeydiyyat</button>
    </div>
    <div id="loginForm">
      <label class="flabel">İstifadəçi adı</label>
      <input class="finput" id="lUser" placeholder="adınız...">
      <label class="flabel">Şifrə</label>
      <input class="finput" id="lPass" type="password" placeholder="••••••">
      <div class="err" id="lErr">İstifadəçi adı və ya şifrə yanlışdır.</div>
      <button class="btn-main" onclick="doLogin()">→ Daxil ol</button>
      <div class="divider"><span>ya da</span></div>
      <button class="btn-ghost" onclick="doGuest()">⚡ Qonaq olaraq davam et</button>
    </div>
    <div id="regForm" style="display:none">
      <label class="flabel">İstifadəçi adı</label>
      <input class="finput" id="rUser" placeholder="unikal ad..." maxlength="20">
      <label class="flabel">Şifrə</label>
      <input class="finput" id="rPass" type="password" placeholder="••••••" maxlength="30">
      <div class="err" id="rErr">Bu istifadəçi adı mövcuddur.</div>
      <button class="btn-main" onclick="doReg()">✓ Hesab yarat</button>
    </div>
    <div class="notice"><b>💡</b> Qonaq girişi ilə avtomatik hesab yaradılır.</div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
function switchTab(t){
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',i===(t==='login'?0:1)));
  document.getElementById('loginForm').style.display=t==='login'?'':'none';
  document.getElementById('regForm').style.display=t==='reg'?'':'none';
}
const DB=()=>{try{return JSON.parse(localStorage.getItem('maya_db')||'{}')}catch{return{}}};
const saveDB=d=>localStorage.setItem('maya_db',JSON.stringify(d));
const setSess=u=>localStorage.setItem('maya_session',JSON.stringify(u));
const enc=s=>btoa(unescape(encodeURIComponent(s)));
const rndCode=()=>Math.random().toString(36).substr(2,5).toUpperCase();
function showErr(id){const e=document.getElementById(id);e.style.display='block';e.style.animation='none';requestAnimationFrame(()=>e.style.animation='');setTimeout(()=>e.style.display='none',3500)}
function doLogin(){
  const u=document.getElementById('lUser').value.trim(),p=document.getElementById('lPass').value;
  const db=DB();if(db[u]&&db[u].pass===enc(p)){setSess(db[u]);location.href='dashboard.html'}else showErr('lErr');
}
function doReg(){
  const u=document.getElementById('rUser').value.trim(),p=document.getElementById('rPass').value;
  if(!u||!p){toast('❌ Ad və şifrə daxil edin');return}
  const db=DB();if(db[u]){showErr('rErr');return}
  const prof={id:'u_'+Date.now(),username:u,display_name:u,pass:enc(p),code:rndCode(),avatar:'🦊',bio:'',photo:null,coins:100,xp:0,level:1,wins:0,created:Date.now()};
  db[u]=prof;saveDB(db);setSess(prof);location.href='dashboard.html';
}
function doGuest(){
  const name='Qonaq'+Math.floor(Math.random()*9999);
  const prof={id:'g_'+Date.now(),username:name,display_name:name,pass:'',code:rndCode(),avatar:'👤',bio:'',photo:null,coins:50,xp:0,level:1,wins:0,guest:true,created:Date.now()};
  const db=DB();db[name]=prof;saveDB(db);setSess(prof);location.href='dashboard.html';
}
let _tt;function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');if(_tt)clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),2500)}
document.addEventListener('keydown',e=>{if(e.key==='Enter'){document.getElementById('loginForm').style.display!=='none'?doLogin():doReg()}});
</script>
</body>
</html>
