<!DOCTYPE html>
<html lang="az"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><title>Söhbət</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0b0c14;--card:#13151f;--surface:#1a1c28;--accent:#ff6b35;--text:#f0f0f5;--muted:#5a5a7a}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden}
.shell{height:100dvh;display:flex;flex-direction:column}
.header{padding:12px 14px;background:var(--card);border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px;flex-shrink:0}
.header span{font-family:'Syne',sans-serif;font-weight:700;font-size:.95rem}
.live-dot{width:7px;height:7px;border-radius:50%;background:#2ed573;animation:p 1.5s infinite}
@keyframes p{0%,100%{opacity:1}50%{opacity:.3}}
.msgs{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:6px}
.msgs::-webkit-scrollbar{width:3px}
.msgs::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:99px}
.msg{display:flex;gap:9px;animation:mIn .2s ease}
@keyframes mIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.msg.sys{justify-content:center;font-size:.76rem;color:var(--muted);font-style:italic;padding:4px 0}
.av{width:32px;height:32px;border-radius:8px;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:700;flex-shrink:0}
.mc{flex:1}
.mn{font-size:.78rem;font-weight:700;margin-bottom:2px}
.mt{font-size:.85rem;line-height:1.4;color:#d8d8f0}
.input-bar{display:flex;gap:8px;padding:10px 12px;background:var(--card);border-top:1px solid rgba(255,255,255,.08);flex-shrink:0}
.input-bar input{flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:10px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.88rem;outline:none}
.input-bar input:focus{border-color:var(--accent)}
.input-bar input::placeholder{color:var(--muted)}
.send{width:38px;height:38px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--accent),#ffb347);color:#fff;font-size:.88rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.2s}
.send:active{transform:scale(.9)}
</style></head>
<body>
<div class="shell">
  <div class="header">
    <div class="live-dot"></div>
    <span>💬 Söhbət Otağı</span>
    <span style="color:var(--muted);font-size:.78rem;margin-left:auto" id="pCount">1 nəfər</span>
  </div>
  <div class="msgs" id="msgs"></div>
  <div class="input-bar">
    <input type="text" id="inp" placeholder="Mesajınızı yazın..." onkeydown="if(event.key==='Enter')send()">
    <button class="send" onclick="send()">➤</button>
  </div>
</div>
<script>
const params=new URLSearchParams(location.search);
const myName=decodeURIComponent(params.get('user')||'Qonaq');
const myId=params.get('uid')||'u_'+Date.now();
const roomId=params.get('room')||'demo';
const WS='wss://maya-platform.onrender.com';
const COLORS=['#ff6b35','#ffb347','#00c8ff','#2ed573','#a78bfa','#f472b6'];
const myColor=COLORS[Math.abs(myId.split('').reduce((h,c)=>((h<<5)-h)+c.charCodeAt(0),0))%COLORS.length];

let ws=null,players=1;

function connectWS(){
  try{
    ws=new WebSocket(WS);
    ws.onopen=()=>{
      ws.send(JSON.stringify({a:'login',tg_id:myId,first_name:myName}));
      setTimeout(()=>ws.send(JSON.stringify({a:'join_room',tg_id:myId,room_id:roomId})),200);
    };
    ws.onmessage=e=>{
      try{
        const d=JSON.parse(e.data);
        if(d.msg_type==='chat'||d.body) appendMsg(d);
        if(d.msg_type==='system') appendSys(d.body);
        if(d.a==='state'&&d.players) updateCount(d.players.length);
      }catch{}
    };
    ws.onerror=ws.onclose=()=>{appendSys('🔌 Server bağlantısı kəsildi')};
  }catch{appendSys('ℹ️ Demo rejim — server bağlantısı yoxdur')}
}

function updateCount(n){players=n;document.getElementById('pCount').textContent=n+' nəfər'}

function appendMsg(m){
  const box=document.getElementById('msgs');
  const div=document.createElement('div');div.className='msg';
  const init=(m.username||m.first_name||'?').substring(0,2).toUpperCase();
  div.innerHTML=`<div class="av" style="background:${m.name_color||myColor}20;color:${m.name_color||myColor}">${init}</div>
    <div class="mc"><div class="mn" style="color:${m.name_color||myColor}">${esc(m.username||m.first_name||'?')}</div>
    <div class="mt">${esc(m.body||m.text||'')}</div></div>`;
  box.appendChild(div);box.scrollTop=box.scrollHeight;
  while(box.children.length>150)box.removeChild(box.firstChild);
}

function appendSys(t){
  const box=document.getElementById('msgs');
  const div=document.createElement('div');div.className='msg sys';div.textContent=t;
  box.appendChild(div);box.scrollTop=box.scrollHeight;
}

function send(){
  const inp=document.getElementById('inp');
  const txt=inp.value.trim();if(!txt)return;
  inp.value='';
  const msg={a:'msg',tg_id:myId,room_id:roomId,text:txt};
  if(ws&&ws.readyState===1) ws.send(JSON.stringify(msg));
  appendMsg({body:txt,username:myName,name_color:myColor});
}

function esc(s){return String(s).replace(/</g,'&lt;').replace(/>/g,'&gt;')}

// Listen from parent
window.addEventListener('message',e=>{
  if(!e.data||typeof e.data!=='object')return;
  const d=e.data;
  if(d.msg_type==='chat'||d.body) appendMsg(d);
  if(d.msg_type==='system') appendSys(d.body);
});

appendSys('👋 Söhbət otağına xoş gəldiniz!');
connectWS();
</script>
</body></html>
