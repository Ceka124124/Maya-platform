<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Maya — Otaq</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#080810;--card:#10121e;--card2:#181a2a;--border:#ffffff0c;--border2:#ffffff15;--accent:#ff6b35;--a2:#ffb347;--text:#eeeef8;--muted:#5a5a80;--green:#2ed573;--cyan:#00c8ff}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif}

/* TOPBAR */
.topbar{height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;background:rgba(8,8,16,.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);flex-shrink:0;position:relative;z-index:60}
.back-btn{width:38px;height:38px;border-radius:50%;background:var(--card2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-size:.9rem;transition:.2s;flex-shrink:0}
.back-btn:active{transform:scale(.88)}
.room-info-top{flex:1;text-align:center;padding:0 10px}
.room-title-top{font-family:'Syne',sans-serif;font-weight:800;font-size:.95rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.room-code{font-size:.68rem;color:var(--muted);margin-top:1px}
.topbar-r{display:flex;align-items:center;gap:8px;flex-shrink:0}
.player-pill{display:flex;align-items:center;gap:4px;background:var(--card2);border:1px solid var(--border2);padding:5px 10px;border-radius:99px;font-size:.74rem;color:var(--muted)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.share-btn{width:34px;height:34px;border-radius:50%;background:var(--card2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.85rem;color:var(--muted);transition:.2s}
.share-btn:active{transform:scale(.9)}

/* LAYOUT */
.layout{display:flex;flex-direction:column;height:calc(100dvh - 54px)}

/* PLAYERS STRIP */
.players-strip{
  display:flex;gap:8px;padding:10px 12px;
  background:rgba(8,8,16,.7);border-bottom:1px solid var(--border);
  overflow-x:auto;flex-shrink:0;
  scrollbar-width:none;
}
.players-strip::-webkit-scrollbar{display:none}
.p-chip{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  min-width:52px;flex-shrink:0;cursor:default;
}
.p-chip-av{
  width:42px;height:42px;border-radius:12px;
  background:var(--card2);display:flex;align-items:center;justify-content:center;
  font-size:1.2rem;border:2px solid var(--border2);transition:.2s;overflow:hidden;position:relative;
}
.p-chip-av img{width:100%;height:100%;object-fit:cover}
.p-chip-av.is-turn{border-color:gold;box-shadow:0 0 10px rgba(255,215,0,.5)}
.p-chip-av.is-host::after{content:'👑';position:absolute;top:-7px;right:-4px;font-size:.7rem}
.p-chip-name{font-size:.62rem;color:var(--muted);max-width:52px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center}
.p-chip-name.is-me{color:var(--accent)}

/* GAME FRAME */
.game-section{flex:1;min-height:0;position:relative;background:#000}
.game-frame{width:100%;height:100%;border:none;display:block}
.loading-screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:var(--bg);z-index:10}
.load-icon{font-size:4.5rem;animation:breathe 2s ease-in-out infinite}
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
.spinner{width:36px;height:36px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-text{font-family:'Syne',sans-serif;font-size:.82rem;color:var(--muted);letter-spacing:1.5px}

/* CHAT FAB */
.chat-fab{position:absolute;bottom:14px;right:12px;width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--a2));color:#fff;font-size:1.1rem;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 6px 20px rgba(255,107,53,.4);z-index:40;border:none;transition:.2s}
.chat-fab:active{transform:scale(.9)}
.chat-badge{position:absolute;top:-4px;right:-4px;width:18px;height:18px;border-radius:50%;background:#ff4757;color:#fff;font-size:.62rem;font-weight:700;display:none;align-items:center;justify-content:center;border:2px solid var(--bg)}

/* REACTION FAB */
.react-fabs{position:absolute;left:12px;bottom:14px;display:flex;flex-direction:column;gap:7px;z-index:40}
.r-fab{width:40px;height:40px;border-radius:50%;background:rgba(16,18,30,.9);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:1.1rem;cursor:pointer;transition:.2s}
.r-fab:active{transform:scale(.85)}

/* CHAT PANEL */
.chat-panel{position:absolute;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border2);border-radius:22px 22px 0 0;z-index:50;transform:translateY(100%);transition:transform .3s cubic-bezier(.2,.9,.4,1);max-height:65dvh;display:flex;flex-direction:column}
.chat-panel.open{transform:none}
.chat-handle{width:36px;height:4px;background:var(--border2);border-radius:99px;margin:12px auto 8px}
.chat-top{display:flex;align-items:center;justify-content:space-between;padding:0 14px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
.chat-top span{font-family:'Syne',sans-serif;font-weight:700;font-size:.9rem}
.chat-close{background:transparent;border:none;color:var(--muted);font-size:1rem;cursor:pointer;padding:4px}
.chat-msgs{flex:1;overflow-y:auto;padding:8px 14px;display:flex;flex-direction:column;gap:5px;min-height:60px}
.chat-msgs::-webkit-scrollbar{width:3px}
.chat-msgs::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}
.cmsg{font-size:.82rem;line-height:1.45;padding:4px 0}
.cmsg .cn{font-weight:700}
.cmsg.sys{color:var(--muted);text-align:center;font-style:italic;font-size:.75rem}
.chat-inp-row{display:flex;gap:8px;padding:10px 14px 20px;border-top:1px solid var(--border);flex-shrink:0}
.chat-inp{flex:1;background:#ffffff07;border:1px solid var(--border2);border-radius:10px;padding:10px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.88rem;outline:none}
.chat-inp:focus{border-color:var(--accent)}
.chat-inp::placeholder{color:var(--muted)}
.send-btn{width:40px;height:40px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--accent),var(--a2));color:#fff;font-size:.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.2s}
.send-btn:active{transform:scale(.9)}

/* FLOAT */
.float-r{position:fixed;pointer-events:none;z-index:999;font-size:2.2rem;animation:fUp 1.5s ease forwards}
@keyframes fUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-90px) scale(1.3)}}

/* INVITE TOAST */
.invite-bar{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:var(--card2);border:1px solid rgba(255,107,53,.4);border-radius:12px;padding:10px 16px;text-align:center;font-size:.8rem;z-index:50;animation:slideDown .3s ease;display:none}
@keyframes slideDown{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.invite-code{font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;color:var(--accent);letter-spacing:2px;cursor:pointer}

/* TOAST */
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-6px);background:var(--card2);border:1px solid var(--border2);border-radius:99px;padding:8px 18px;font-size:.8rem;color:var(--text);z-index:999;opacity:0;transition:.25s;pointer-events:none;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="topbar">
  <div class="back-btn" onclick="goBack()"><i class="fa fa-arrow-left"></i></div>
  <div class="room-info-top">
    <div class="room-title-top" id="roomTitle">Yüklənir...</div>
    <div class="room-code" id="roomCodeTop">#—</div>
  </div>
  <div class="topbar-r">
    <div class="player-pill"><div class="live-dot"></div><span id="pCount">1</span></div>
    <div class="share-btn" onclick="shareRoom()" title="Paylaş"><i class="fa fa-share-nodes"></i></div>
  </div>
</div>

<div class="layout">
  <!-- Players strip -->
  <div class="players-strip" id="playersStrip">
    <div class="p-chip"><div class="p-chip-av">👤</div><div class="p-chip-name">Yüklənir</div></div>
  </div>

  <!-- Game -->
  <div class="game-section" id="gameSection">
    <div class="loading-screen" id="loadScreen">
      <div class="load-icon" id="loadIcon">🎮</div>
      <div class="spinner"></div>
      <div class="load-text" id="loadText">OYUN YÜKLƏNİR...</div>
    </div>
    <iframe id="gameFrame" class="game-frame" style="display:none" allowfullscreen></iframe>

    <!-- Invite overlay -->
    <div class="invite-bar" id="inviteBar">
      Arkadaşları dəvət et · Kod: <span class="invite-code" onclick="copyCode()" id="inviteCode">—</span>
    </div>

    <!-- Reactions -->
    <div class="react-fabs">
      <div class="r-fab" onclick="sendReact('🔥')">🔥</div>
      <div class="r-fab" onclick="sendReact('😂')">😂</div>
      <div class="r-fab" onclick="sendReact('❤️')">❤️</div>
      <div class="r-fab" onclick="sendReact('👏')">👏</div>
    </div>

    <!-- Chat FAB -->
    <button class="chat-fab" onclick="toggleChat()">
      <i class="fa fa-comment"></i>
      <div class="chat-badge" id="chatBadge"></div>
    </button>

    <!-- Chat Panel -->
    <div class="chat-panel" id="chatPanel">
      <div class="chat-handle"></div>
      <div class="chat-top">
        <span>💬 Söhbət</span>
        <button class="chat-close" onclick="toggleChat()"><i class="fa fa-xmark"></i></button>
      </div>
      <div class="chat-msgs" id="chatMsgs"></div>
      <div class="chat-inp-row">
        <input class="chat-inp" id="chatInp" placeholder="Mesaj yaz..." onkeydown="if(event.key==='Enter')sendChat()">
        <button class="send-btn" onclick="sendChat()"><i class="fa fa-paper-plane"></i></button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
const GAME_ICON={sise:'🍾',dama:'♟️',uno:'🃏',domino:'🁢',film:'🎬',chat:'💬'};
const GAME_NAME={sise:'Şişə Çevir',dama:'Dama',uno:'UNO',domino:'Domino',film:'Film Quiz',chat:'Söhbət'};
const GAME_FILE={sise:'games/sise.html',dama:'games/dama.html',uno:'games/uno.html',domino:'games/domino.html',film:'games/film.html',chat:'games/chat.html'};
const WS_URL=location.origin;

const params=new URLSearchParams(location.search);
const roomId=params.get('id');
const gameType=params.get('game')||'sise';
const roomCode=params.get('code')||'—';

let sess=null, socket=null, chatOpen=false, unread=0, roomState=null;

function getSess(){return JSON.parse(localStorage.getItem('maya_session')||'null')}
function saveSess(s){localStorage.setItem('maya_session',JSON.stringify(s))}

function init(){
  sess=getSess();
  if(!sess){location.href='index.html';return}
  document.getElementById('roomTitle').textContent=GAME_NAME[gameType]||'Otaq';
  document.getElementById('roomCodeTop').textContent='#'+roomCode;
  document.getElementById('loadIcon').textContent=GAME_ICON[gameType]||'🎮';
  document.getElementById('inviteCode').textContent=roomCode;
  document.getElementById('inviteBar').style.display='block';
  setTimeout(()=>document.getElementById('inviteBar').style.display='none',5000);
  connectSocket();
  loadGame();
}

/* ── SOCKET ── */
function connectSocket(){
  socket=io(WS_URL,{transports:['websocket','polling']});
  socket.on('connect',()=>{
    socket.emit('auth',{id:sess.id,display_name:sess.display_name||sess.username,avatar:sess.avatar,photo:sess.photo});
    socket.emit('join_room',{room_id:roomId,code:roomCode},res=>{
      if(res?.ok){
        toast('✅ Otağa qoşuldunuz!');
        if(res.slot) sess._slot=res.slot;
      } else if(res?.e){
        toast('❌ '+res.e);
        setTimeout(()=>location.href='dashboard.html',2000);
      }
    });
  });
  socket.on('state', handleState);
  socket.on('new_msg', appendMsg);
  socket.on('history', msgs=>{document.getElementById('chatMsgs').innerHTML='';msgs.forEach(appendMsg)});
  socket.on('reaction', d=>spawnFloat(d.emoji));
  socket.on('disconnect',()=>toast('⚠️ Bağlantı kəsildi...'));
  // Forward ALL events to game iframe
  const FORWARD=['spin','challenge_result','board_update','game_start','game_end',
                  'uno_start','uno_update','uno_hand','domino_start','domino_update','domino_hand',
                  'film_question','film_answer','film_answered','state'];
  FORWARD.forEach(ev=>socket.on(ev,d=>fwdToFrame({...d,_event:ev})));
}

function handleState(d){
  roomState=d;
  const players=d.players||[];
  document.getElementById('pCount').textContent=players.length;
  renderPlayers(players,d.room);
}

function renderPlayers(players,room){
  const strip=document.getElementById('playersStrip');
  if(!players.length) return;
  strip.innerHTML=players.map(p=>{
    const isMe=p.id===sess.id;
    const isHost=p.id===room?.host;
    const isTurn=p.id===room?.current_turn;
    const av=p.photo?`<img src="${p.photo}">`:(p.avatar||'👤');
    return `<div class="p-chip">
      <div class="p-chip-av${isTurn?' is-turn':''}${isHost?' is-host':''}">${av}</div>
      <div class="p-chip-name${isMe?' is-me':''}">${esc(p.display_name||p.username||'?')}</div>
    </div>`;
  }).join('');
}

/* ── GAME FRAME ── */
function loadGame(){
  const frame=document.getElementById('gameFrame');
  const loadScreen=document.getElementById('loadScreen');
  const url=`${GAME_FILE[gameType]}?room=${roomId}&uid=${sess.id}&user=${encodeURIComponent(sess.display_name||sess.username)}&code=${roomCode}&ws=${encodeURIComponent(WS_URL)}`;
  frame.src=url;
  frame.onload=()=>{loadScreen.style.display='none';frame.style.display='block'};
  setTimeout(()=>{
    if(loadScreen.style.display!=='none'){
      loadScreen.innerHTML=`<div style="font-size:3rem">😅</div><div style="color:var(--muted);font-size:.82rem;margin-top:10px">Oyun faylı tapılmadı</div><button onclick="goBack()" style="margin-top:16px;padding:10px 22px;background:var(--accent);color:#fff;border:none;border-radius:12px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.9rem">← Geri</button>`;
    }
  },9000);
}

function fwdToFrame(data){
  const f=document.getElementById('gameFrame');
  try{if(f.contentWindow)f.contentWindow.postMessage(data,'*')}catch{}
}

/* ── MESSAGES FROM FRAME ── */
window.addEventListener('message',e=>{
  if(!e.data||typeof e.data!=='object') return;
  const d=e.data;
  if(!socket?.connected) return;
  // Route game actions to server
  const action=d._action||d.a||d.action;
  if(action) socket.emit(action,{...d,room_id:roomId,tg_id:sess.id},res=>{
    try{if(res&&document.getElementById('gameFrame').contentWindow)document.getElementById('gameFrame').contentWindow.postMessage({...res,_action:action+'_res'},'*')}catch{}
  });
});

/* ── CHAT ── */
function toggleChat(){
  chatOpen=!chatOpen;
  document.getElementById('chatPanel').classList.toggle('open',chatOpen);
  if(chatOpen){unread=0;document.getElementById('chatBadge').style.display='none';document.getElementById('chatInp').focus()}
}

function sendChat(){
  const inp=document.getElementById('chatInp');
  const txt=inp.value.trim();if(!txt)return;inp.value='';
  if(socket?.connected) socket.emit('msg',{text:txt,room_id:roomId},()=>{});
  appendMsg({type:'chat',body:txt,name:sess.display_name||sess.username,color:sess.color||'#ff6b35'});
}

function appendMsg(m){
  const box=document.getElementById('chatMsgs');
  const d=document.createElement('div');
  if(m.type==='system'||m.sys){
    d.className='cmsg sys';d.textContent=m.body||m.text||'';
  } else {
    d.className='cmsg';
    const col=m.color||m.name_color||'#ff6b35';
    d.innerHTML=`<span class="cn" style="color:${col}">${esc(m.name||m.uid||'?')}</span>: ${esc(m.body||m.text||'')}`;
  }
  box.appendChild(d);box.scrollTop=box.scrollHeight;
  while(box.children.length>120)box.removeChild(box.firstChild);
  if(!chatOpen&&m.type!=='system'){
    unread++;
    const badge=document.getElementById('chatBadge');
    badge.style.display='flex';badge.textContent=unread>9?'9+':unread;
  }
}

/* ── REACTIONS ── */
function sendReact(emoji){
  if(socket?.connected) socket.emit('reaction',{emoji,room_id:roomId});
  spawnFloat(emoji);
}
function spawnFloat(emoji){
  const el=document.createElement('div');el.className='float-r';el.textContent=emoji;
  el.style.left=(8+Math.random()*70)+'vw';el.style.bottom='28%';
  document.body.appendChild(el);setTimeout(()=>el.remove(),1600);
}

/* ── SHARE ── */
function shareRoom(){
  const txt=`🔥 Maya Oyun Platformu\nOtaq kodu: ${roomCode}\nOyun: ${GAME_NAME[gameType]||gameType}`;
  if(navigator.share) navigator.share({title:'Maya',text:txt}).catch(()=>{});
  else {navigator.clipboard.writeText(txt).then(()=>toast('📋 Kopyalandı!')).catch(()=>copyCode())}
}
function copyCode(){navigator.clipboard.writeText(roomCode).then(()=>toast('📋 Kod kopyalandı: '+roomCode)).catch(()=>toast('Kod: '+roomCode))}

function goBack(){if(socket)socket.emit('leave_room');socket?.disconnect();location.href='dashboard.html'}

let _tt;
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');if(_tt)clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),2500)}
function esc(s){return String(s).replace(/</g,'&lt;').replace(/>/g,'&gt;')}

init();
</script>
</body>
</html>
